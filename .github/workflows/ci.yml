name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke:
    name: Build and smoke test
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: |
          swift build \
            --disable-sandbox \
            --disable-build-manifest-caching \
            --cache-path .build/cache \
            --scratch-path .build/swiftpm

      - name: Smoke test
        run: ./scripts/smoke-test.sh

  package-artifact:
    name: Package preview artifact
    runs-on: macos-15
    needs: build-and-smoke
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package unsigned app bundle
        run: ./scripts/package-artifact.sh

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: RightClickKit-macos-preview
          path: |
            dist/RightClickKit-macos-unsigned.zip
            dist/rck
            dist/ARTIFACT_README.txt
          if-no-files-found: error
